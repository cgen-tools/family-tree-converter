<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ClanGen Family Tree</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        font-family: Arial, Helvetica, sans-serif;
      }
      p {
        line-height: 1.5;
      }
      button,
      input::file-selector-button {
        color: rgb(79, 64, 57);
        background-color: rgb(245, 240, 234);
        border: 1px solid rgb(141, 131, 118);
        border-radius: 5px;
      }
      button:disabled,
      button:disabled:hover {
        background-color: rgb(245, 240, 234);
        color: rgb(150, 148, 147);
      }
      button:hover,
      input::file-selector-button:hover {
        background-color: rgb(217, 202, 187);
      }

      label {
        font-size: small;
        display: block;
        font-family: sans-serif;
      }

      html {
        background-color: rgb(165, 154, 139);
      }
      body {
        background-color: rgb(237, 230, 220);
        padding: 0 1em 1em 1em;
        border: 1px solid rgb(92, 79, 69);
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }
      footer {
        text-align: right;
        border-top: 0.5px solid rgb(92, 79, 69);
        font-size: x-small;
        margin-top: 1em;
        padding-top: 0.25em;
      }

      .form-row {
        margin-bottom: 1em;
      }
      #submit {
        width: 100%;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div>
      <p>
        Convert ClanGen (v0.13) save data to FamilyScript (able to import in
        <a href="https://www.familyecho.com/">FamilyEcho</a>). All conversion is
        done directly in your browser, so nothing is uploaded to a server.
      </p>
      <p>For technical reasons, images cannot be supported.</p>
    </div>

    <div class="form-row">
      <label>Upload clan_cats.json</label>
      <input id="clan_cats" accept=".json" type="file" />
    </div>

    <div class="form-row">
      <label>Upload faded cats files</label>
      <input id="faded_cats" accept=".json" multiple type="file" />
    </div>

    <button disabled id="submit">Download</button>

    <footer>
      This is an unofficial fan site that is unaffiliated with FamilyEcho.
    </footer>

    <script>
      /**
       * @typedef FamilyTree
       * @type {object}
       * @property {string} ID
       * @property {string} name
       * @property {string | null} bioMother
       * @property {string | null} bioFather
       * @property {string[]} otherMothers
       * @property {string[]} otherFathers
       * @property {boolean} isDead
       * @property {string} gender
       * @property {string | null} rank
       * @property {string | null} afterlife
       */

      /** @type {HTMLInputElement} */
      const clanCatsFileInput = document.getElementById("clan_cats");
      /** @type {HTMLInputElement} */
      const fadedCatsFileInput = document.getElementById("faded_cats");
      /** @type {HTMLButtonElement} */
      const submitButton = document.getElementById("submit");

      /**
       * Promise wrapper for reading file data from HTML input elements.
       *
       * @param {File} file
       * @return {Promise<string>}
       */
      function readFileData(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (event) => {
            const data = event.target.result;
            resolve(data);
          };
          reader.onerror = (event) => {
            reject(event);
          };
          reader.readAsText(file);
        });
      }

      /**
       *
       * @param {string} filename
       */
      function downloadFile(filename, data) {
        const blob = new Blob([data]);
        const elem = window.document.createElement("a");
        elem.href = window.URL.createObjectURL(blob);
        elem.download = filename;
        document.body.appendChild(elem);
        elem.click();
        document.body.removeChild(elem);
      }

      /**
       * @return {FamilyTree[]}
       */
      function buildFamilyTree(clanCats, fadedCats) {
        const tree = [];

        // so we can access cats by ID
        const catByID = {};
        for (const cat of clanCats) {
          catByID[cat.ID] = cat;
          catByID[cat.ID].isFaded = false;
        }
        if (fadedCats) {
          for (const cat of fadedCats) {
            catByID[cat.ID] = cat;
            catByID[cat.ID].isFaded = true;
          }
        }

        // get family data
        for (const cat of fadedCats.concat(clanCats)) {
          const catData = {};
          catData.ID = cat.ID;

          catData.name = `${cat.name_prefix}${cat.name_suffix}`;

          catData.rank = null;
          catData.afterlife = null;

          let latestGroupHistory;
          if (cat.status.group_history) {
            latestGroupHistory = cat.status.group_history.at(-1);

            // job
            catData.rank = latestGroupHistory.rank;

            // special names
            if (catData.rank === "leader" && !cat.specsuffix_hidden) {
              catData.name = `${cat.name_prefix}star`;
            } else if (
              (catData.rank === "kitten" || catData.rank === "newborn") &&
              !cat.specsuffix_hidden
            ) {
              catData.name = `${cat.name_prefix}kit`;
            } else if (
              catData.rank &&
              catData.rank.includes("apprentice") &&
              !cat.specsuffix_hidden
            ) {
              catData.name = `${cat.name_prefix}paw`;
            }

            // afterlife
            if (latestGroupHistory.group === "2") {
              catData.afterlife = "StarClan";
            } else if (latestGroupHistory.group === "3") {
              catData.afterlife = "Unknown Residence";
            } else if (latestGroupHistory.group === "4") {
              catData.afterlife = "Dark Forest";
            }
          }
          // dead or alive
          if (cat.isFaded || catData.afterlife) {
            catData.isDead = true;
          } else {
            catData.isDead = false;
          }

          // gender
          catData.gender = cat.gender_align;

          // bio parents
          catData.bioMother = cat.parent1;
          catData.bioFather = cat.parent2;

          // adoptive parents
          catData.otherMothers = [];
          catData.otherFathers = [];
          for (const adoptiveParentID of cat.adoptive_parents) {
            const adoptiveParent = catByID[adoptiveParentID];
            // just in case
            if (!adoptiveParent) {
              continue;
            }
            if (adoptiveParent.gender === "male") {
              catData.otherFathers.push(adoptiveParentID);
            } else if (adoptiveParent.gender === "female") {
              catData.otherMothers.push(adoptiveParentID);
            }
            // no more gender data. just add to the one w/ less
            else {
              if (catData.otherFathers.length > catData.otherMothers.length) {
                catData.otherFathers.push(adoptiveParentID);
              } else {
                catData.otherMothers.push(adoptiveParentID);
              }
            }
          }
          tree.push(catData);
        }
        return tree;
      }

      /**
       * Builds Family Echo-compatible FamilyScript
       * @param {FamilyTree[]} familyTree
       */
      function buildFamilyScript(familyTree) {
        let script = "";

        for (const cat of familyTree) {
          script = script.concat(`i${cat.ID}`);
          script = script.concat(`\tp${cat.name}`);

          // dead
          if (cat.isDead) {
            script = script.concat("\tz1");
          }

          // gender
          if (cat.gender === "male") {
            script = script.concat("\tgm");
            script = script.concat("\tGblue");
          } else if (cat.gender === "female") {
            script = script.concat("\tgf");
            script = script.concat("\tGpink");
          } else {
            script = script.concat(`\tgo${cat.gender}`);
            if (cat.gender === "trans male") {
              script = script.concat("\tGblue");
            } else if (cat.gender === "trans female") {
              script = script.concat("\tGpink");
            } else if (cat.gender === undefined) {
              script = script.concat("\tGsilver");
            } else {
              script = script.concat("\tGpurple");
            }
          }

          // job
          if (cat.rank) {
            const rankWords = cat.rank.split(" ");
            const capitalizedRankWords = [];
            for (const word of rankWords) {
              capitalizedRankWords.push(
                word.charAt(0).toUpperCase() + word.substring(1),
              );
            }
            script = script.concat(`\tj${capitalizedRankWords.join(" ")}`);
          }

          // parents
          let primaryParentSet;
          if (cat.bioFather) {
            script = script.concat(`\tf${cat.bioFather}`);
            primaryParentSet = "b";
          }
          if (cat.bioMother) {
            script = script.concat(`\tm${cat.bioMother}`);
            primaryParentSet = "b";
          }
          if (primaryParentSet) {
            script = script.concat(`\tV${primaryParentSet}`);
          }
          script = script.concat("\n");
        }
        return script;
      }

      clanCatsFileInput.addEventListener("change", (e) => {
        const file = clanCatsFileInput.files[0];
        if (!file) {
          submitButton.disabled = true;
        } else {
          submitButton.disabled = false;
        }
      });

      submitButton.addEventListener("click", async (e) => {
        e.preventDefault();

        let clanCats;
        let fadedCats = [];

        // just in case
        const file = clanCatsFileInput.files[0];
        if (!file) {
          return;
        }

        // read clan_cats.json
        const clanCatsString = await readFileData(file);
        try {
          clanCats = JSON.parse(clanCatsString);
        } catch (except) {
          alert(except);
          return;
        }

        // read faded cats json files
        const fadedCatsFiles = fadedCatsFileInput.files;
        if (fadedCatsFiles) {
          try {
            const fadedCatPromises = Array.from(fadedCatsFiles).map((v) =>
              readFileData(v),
            );
            const fileStrs = await Promise.all(fadedCatPromises);

            fadedCats = fileStrs.map((v) => JSON.parse(v));
          } catch (except) {
            alert(except);
            return;
          }
        }

        const familyTree = buildFamilyTree(clanCats, fadedCats);
        const familyScript = buildFamilyScript(familyTree);

        downloadFile("familyscript.txt", familyScript);
      });
    </script>
  </body>
</html>
